name: Deploy to Firebase Hosting on PR

on:
  pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Create .env from secrets
        run: |
          cat > frontend/.env <<EOF
          EMAIL_PROXY_URL=${{ secrets.EMAIL_PROXY_URL }}
          EMAIL_FROM_ADDRESS=${{ secrets.EMAIL_FROM_ADDRESS }}
          EMAIL_API_KEY=${{ secrets.EMAIL_API_KEY }}
          EOF

      - name: Install dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Build web
        run: flutter build web --release --dart-define=EMAIL_PROXY_URL=${{ secrets.EMAIL_PROXY_URL }}
        working-directory: frontend

      - name: Deploy preview to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FOODWASTEZERO_528AC }}
          projectId: foodwastezero-528ac
          # channelId ni nastavljen = Firebase avtomatsko ustvari preview URL za vsak PR