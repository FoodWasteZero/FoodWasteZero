name: praktikum2
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  shared_preferences: ^2.3.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # Slike
  image_picker: ^1.1.2

  # AI & API
  google_generative_ai: ^0.4.0

  # Zemljevid & lokacija
  url_launcher: ^6.3.0
  geolocator: ^13.0.0 # ← NOVO: GPS lokacija
  http: ^1.6.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/FoodZeroIcon.png"
  adaptive_icon_background: "#e1f7e1"
  adaptive_icon_foreground: "assets/icon/FoodZeroIcon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
